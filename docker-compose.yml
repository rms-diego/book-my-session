services:
  database:
    env_file: .env
    image: postgres:latest
    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.infra:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
    driver: local
